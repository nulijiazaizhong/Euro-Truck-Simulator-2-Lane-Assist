name: Mirror to CNB Repo

on:
  push:
    branches:
      - main
      - master

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mirror to CNB
        run: |
          git config --global user.name "github-bot"
          git config --global user.email "actions@github.com"
          git remote add cnb https://eLw1FVT7XetoRNf1feccNOKoHaJcnb.cool/ETS2LA-CN/Euro-Truck-Simulator-2-Lane-Assist.git
          git push --mirror cnb
